<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f5f0e8">
    <title>Arrow Puzzle Game - Premium Mobile Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Game Container -->
    <div id="gameContainer">
        
        <!-- Top UI Bar -->
        <div id="topBar">
            <!-- Left Section: empty spacer for balance -->
            <div class="top-left"></div>

            <!-- Center Section: Hearts -->
            <div class="top-center">
                <div class="lives-panel" id="livesPanel">
                    <div class="heart" data-index="0">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </div>
                    <div class="heart" data-index="1">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </div>
                    <div class="heart" data-index="2">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Right Section: Back & Settings -->
            <div class="top-right">
                <button class="icon-btn settings-btn" id="settingsBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Bottom Bar: Level Badge (centered) -->
        <div id="bottomBar">
            <span class="level-badge">Level <span id="levelNumber">1</span></span>
        </div>
        
        <!-- Zoom Controls -->
        <div class="zoom-controls" id="zoomControls">
            <button class="zoom-btn" id="zoomInBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button class="zoom-btn" id="zoomOutBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        
        <!-- Game Board Container -->
        <div id="boardContainer">
            <div id="gameBoard"></div>
        </div>
        
<!-- Victory Popup -->
        <div class="popup victory-popup" id="victoryPopup">
            <div class="popup-content">
                <div class="popup-header">
                    <h2>Level Complete!</h2>
                    <div class="stars">
                        <svg class="star" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                        </svg>
                        <svg class="star" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                        </svg>
                        <svg class="star" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="popup-body">
                </div>
            </div>
        </div>
        
        <!-- Settings Popup -->
        <div class="popup settings-popup" id="settingsPopup">
            <div class="popup-content">
                <div class="popup-header">
                    <h2>Settings</h2>
                    <button class="close-btn" id="closeSettingsBtn">×</button>
                </div>
                <div class="popup-body">
                    <div class="setting-item">
                        <span>Sound Effects</span>
                        <label class="toggle">
                            <input type="checkbox" id="soundToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>Music</span>
                        <label class="toggle">
                            <input type="checkbox" id="musicToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <span>Vibration</span>
                        <label class="toggle">
                            <input type="checkbox" id="vibrationToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Game Over Popup -->
        <div class="popup gameover-popup" id="gameOverPopup">
            <div class="popup-content">
                <div class="popup-header">
                    <div class="gameover-icon">💔</div>
                    <h2>No Lives Left!</h2>
                </div>
                <div class="popup-body">
                    <p class="gameover-msg">Don't give up — try again!</p>
                </div>
                <div class="popup-footer">
                    <button class="btn-primary" id="retryBtn">Try Again</button>
                    <button class="btn-secondary" id="restartBtn">Level 1</button>
                </div>
            </div>
        </div>

        <!-- Particles Container -->
        <canvas id="particlesCanvas"></canvas>
        
    </div>
    
    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utilities.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/level.js"></script>
    <script src="js/admin-bridge.js"></script>
    <script src="js/block.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
